    <style>
        :root {
            --primary-dark: #001f3f; /* Bleu Marine Doulia */
            --primary-deep: #000b18; /* Fond encore plus profond */
            --accent-lime: #ccff00; /* Vert Citron Doulia */
            --text-light: #ffffff;
            --text-dim: #cbd5e1;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(204, 255, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary-dark) 100%);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- AI PARTICLES CANVAS --- */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- AI GLOW EFFECTS --- */
        .ai-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(204, 255, 0, 0.05) 0%, rgba(204, 255, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(50px);
            pointer-events: none;
            animation: floatGlow 20s infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(110%, 110%); }
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .section {
            padding: 100px 0;
            position: relative;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3, h4 {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .highlight-text {
            color: var(--accent-lime);
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
        }

        .formula-font {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 1px;
        }

        /* --- BUTTONS --- */
        .btn-cta {
            display: inline-block;
            padding: 18px 45px;
            background: var(--accent-lime);
            color: var(--primary-dark);
            font-weight: 800;
            text-decoration: none;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-cta:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.5);
        }

        .print-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        
        .print-btn:hover { background: var(--accent-lime); color: var(--primary-dark); }

        /* --- HERO --- */
        #hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(0, 31, 63, 0.5) 0%, var(--primary-deep) 100%);
        }

        .hero-logo {
            max-width: 220px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            animation: pulseLogo 3s infinite ease-in-out;
            border-radius: 10px;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.2); }
        }

        .hero-content h1 {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 25px;
        }

        .hero-content p {
            font-size: 1.4rem;
            color: var(--text-dim);
            max-width: 900px;
            margin: 0 auto 40px;
            font-weight: 300;
        }

        /* --- SECTORS (INTERACTIVE) --- */
        .sector-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
        }

        .sector-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .sector-btn {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .sector-btn:hover, .sector-btn.active {
            background: rgba(204, 255, 0, 0.1);
            border-color: var(--accent-lime);
            color: var(--accent-lime);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.2);
        }

        #sector-content {
            font-style: italic;
            color: white;
            font-size: 1.1rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- PACKS & TARIFFS --- */
        .pack-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .pack-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }

        .pack-card:hover {
            border-color: var(--accent-lime);
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.15);
            transform: translateY(-5px);
        }

        .badge-popular {
            position: absolute;
            top: 15px;
            right: -35px;
            background: var(--accent-lime);
            color: var(--primary-dark);
            padding: 5px 40px;
            transform: rotate(45deg);
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 2;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .pack-img {
            height: 200px;
            width: 100%;
            object-fit: cover;
            filter: grayscale(30%) brightness(0.8);
            transition: 0.5s;
            border-bottom: 2px solid var(--accent-lime);
        }

        .pack-card:hover .pack-img {
            filter: grayscale(0%) brightness(1);
        }

        .pack-content { padding: 30px; }

        .price-container {
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin: 20px 0;
            padding: 20px 0;
            text-align: center;
        }

        .price-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .price-value { font-size: 2rem; font-weight: 800; color: white; line-height: 1.2; margin-bottom: 15px; }
        .price-value span { font-size: 1rem; font-weight: normal; color: var(--text-dim); }
        .price-value.maint { font-size: 1.5rem; color: var(--accent-lime); margin-bottom: 0; }
        .price-prefix { font-size: 0.9rem; font-weight: 400; color: var(--text-dim); display: block; margin-bottom: -5px; }

        /* Accordion in Packs */
        .accordion-btn {
            width: 100%;
            background: rgba(204, 255, 0, 0.05);
            color: white;
            border: 1px solid rgba(204, 255, 0, 0.3);
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            margin-top: 10px;
        }

        .accordion-btn:hover { background: rgba(204, 255, 0, 0.2); }
        
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }
        
        .accordion-content.active {
            max-height: 500px;
            padding-top: 20px;
        }

        .feature-list { list-style: none; }
        .feature-list li {
            margin-bottom: 12px;
            padding-left: 25px;
            position: relative;
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        .feature-list li::before {
            content: '>';
            color: var(--accent-lime);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        /* --- SERVICES SUR-MESURE & CALCULATOR --- */
        .services-wrapper {
            background: rgba(255,255,255,0.02);
            padding: 60px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .formula-box {
            background: rgba(0, 11, 24, 0.8);
            border: 1px solid var(--accent-lime);
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            margin: 30px 0;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.1);
        }

        .formula-text {
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
        }

        .formula-text span { color: var(--accent-lime); }

        /* ROI Calculator */
        .calculator-box {
            background: var(--primary-dark);
            border-radius: 8px;
            padding: 30px;
            margin-top: 30px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .calc-input-group { margin-bottom: 20px; }
        .calc-input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        .calc-input-group input { 
            width: 100%; padding: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white; font-family: 'Montserrat', sans-serif;
        }
